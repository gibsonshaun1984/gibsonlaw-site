<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gibson Law</title>
  <meta name="description" content="Gibson Law. Legal and commercial advisory for events, sport and rights holders." />

  <style>
    :root {
      --bg: #FAFAF8;
      --text: #18181B;
      --muted: #6B7280;
      --line: rgba(24, 24, 27, 0.12);
      --teal: #115E59;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 64px 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
    }

    .brand {
      color: var(--text);
      text-decoration: none;
      font-size: 25px;
      font-weight: 500;
      letter-spacing: -0.045em;
      line-height: 1;
    }

    .dot {
      color: var(--teal);
    }

    .contact-top {
      color: var(--text);
      font-size: 16px;
      font-weight: 400;
      text-decoration: none;
      padding-bottom: 7px;
      border-bottom: 1.5px solid var(--teal);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero {
      width: 100%;
      max-width: 680px;
      transform: translateY(-2vh);
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 5.4vw, 76px);
      font-weight: 500;
      letter-spacing: -0.055em;
      line-height: 1.02;
    }

    .tagline {
      margin: 34px 0 0;
      color: var(--muted);
      font-size: clamp(17px, 1.4vw, 21px);
      font-weight: 400;
      line-height: 1.65;
    }

    .tagline .primary {
      color: var(--text);
    }

    .email {
      display: inline-block;
      margin-top: 38px;
      color: var(--teal);
      font-size: clamp(16px, 1.25vw, 19px);
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1.5px solid var(--teal);
      padding-bottom: 5px;
    }

    footer {
      text-align: center;
      color: rgba(24, 24, 27, 0.45);
      font-size: 13px;
      padding-top: 32px;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 700px) {
      .page {
        padding: 30px 24px 28px;
      }

      .brand {
        font-size: 22px;
      }

      .contact-top {
        font-size: 15px;
        padding-bottom: 6px;
      }

      .hero {
        max-width: 100%;
        transform: translateY(-3vh);
      }

      h1 {
        font-size: clamp(42px, 13vw, 58px);
        letter-spacing: -0.05em;
      }

      .tagline {
        margin-top: 28px;
        font-size: 17px;
        line-height: 1.6;
      }

      .email {
        margin-top: 34px;
        font-size: 16px;
      }

      footer {
        font-size: 12px;
        padding-top: 26px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a class="brand" href="/">Gibson Law<span class="dot">.</span></a>
      <a class="contact-top" href="mailto:info@gibsonlaw.ai">Contact us</a>
    </header>

    <main>
      <section class="hero" aria-label="Gibson Law introduction">
        <h1>Gibson Law<span class="dot">.</span></h1>

        <p class="tagline">
          Legal and commercial advisory.<br />
          Events, sport and rights holders.<br /><br />
          20 years’ international experience.<br />
          AI-enabled delivery.
        </p>

        <a class="email" href="mailto:info@gibsonlaw.ai">
          info@gibsonlaw.ai
        </a>
      </section>
    </main>

    <footer>
      © 2025 Gibson Law. All rights reserved.
    </footer>
  </div>
</body>
</html>
