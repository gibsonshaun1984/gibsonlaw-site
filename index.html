<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gibson Law</title>

  <style>
    :root {
      --bg: #050607;
      --text: #f5f5f5;
      --muted: #a8a8a8;
      --line: rgba(255,255,255,0.16);
      --blue: #2563ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.025), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 60px 36px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .brand {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.04em;
      text-decoration: none;
      color: var(--text);
    }

    .dot {
      color: var(--blue);
    }

    .contact-top {
      color: var(--text);
      font-size: 17px;
      text-decoration: none;
      padding-bottom: 7px;
      border-bottom: 2px solid var(--blue);
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      padding-top: 13vh;
    }

    .hero {
      max-width: 760px;
      width: 100%;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 500;
      letter-spacing: -0.045em;
      line-height: 1.05;
    }

    .divider {
      width: 140px;
      height: 1px;
      background: var(--line);
      margin: 40px auto 32px;
    }

    .tagline {
      color: var(--muted);
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.5;
      margin: 0 0 48px;
      font-weight: 400;
    }

    .email {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      color: var(--text);
      font-size: clamp(17px, 1.8vw, 22px);
      text-decoration: none;
    }

    .email svg {
      width: 30px;
      height: 30px;
      stroke: var(--blue);
      flex: 0 0 auto;
    }

    .email span {
      border-bottom: 2px solid var(--blue);
      padding-bottom: 6px;
    }

    footer {
      text-align: center;
      color: rgba(255,255,255,0.42);
      font-size: 14px;
    }

    footer::before {
      content: "";
      display: block;
      height: 1px;
      background: var(--line);
      margin: 0 0 42px;
    }

    @media (max-width: 700px) {
      .page {
        padding: 28px 24px 28px;
      }

      .brand {
        font-size: 22px;
      }

      .contact-top {
        font-size: 16px;
      }

      main {
        padding-top: 16vh;
      }

      .divider {
        width: 110px;
        margin: 34px auto 28px;
      }

      .tagline {
        margin-bottom: 42px;
      }

      .email {
        gap: 14px;
      }

      .email svg {
        width: 26px;
        height: 26px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a class="brand" href="/">Gibson Law<span class="dot">.</span></a>
      <a class="contact-top" href="mailto:info@gibsonlaw.ai">Contact us</a>
    </header>

    <main>
      <section class="hero">
        <h1>Gibson Law<span class="dot">.</span></h1>

        <div class="divider"></div>

        <p class="tagline">
          Legal and commercial advisory.<br />
          Delivered differently.
        </p>

        <a class="email" href="mailto:info@gibsonlaw.ai">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
            <path d="M3 7l9 6 9-6"></path>
          </svg>
          <span>info@gibsonlaw.ai</span>
        </a>
      </section>
    </main>

    <footer>
      © 2025 Gibson Law. All rights reserved.
    </footer>
  </div>
</body>
</html>
