<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gibson Law</title>

  <style>
    :root {
      --bg: #050607;
      --text: #f5f5f5;
      --muted: #b7b7b7;
      --line: rgba(255,255,255,0.18);
      --blue: #2563ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.035), transparent 38%),
        #050607;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 60px 36px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .brand {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.04em;
      text-decoration: none;
      color: var(--text);
    }

    .dot {
      color: var(--blue);
    }

    .contact-top {
      color: var(--text);
      font-size: 18px;
      text-decoration: none;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--blue);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: translateY(-20px);
    }

    .hero {
      max-width: 980px;
      width: 100%;
    }

    h1 {
      margin: 0;
      font-size: clamp(64px, 11vw, 138px);
      font-weight: 500;
      letter-spacing: -0.075em;
      line-height: 0.95;
    }

    .divider {
      width: 240px;
      height: 1px;
      background: var(--line);
      margin: 70px auto 52px;
    }

    .tagline {
      color: var(--muted);
      font-size: clamp(22px, 2.5vw, 31px);
      line-height: 1.55;
      margin: 0 0 72px;
      font-weight: 400;
    }

    .email {
      display: inline-flex;
      align-items: center;
      gap: 22px;
      color: var(--text);
      font-size: clamp(18px, 2vw, 24px);
      text-decoration: none;
    }

    .email svg {
      width: 34px;
      height: 34px;
      stroke: var(--blue);
      flex: 0 0 auto;
    }

    .email span {
      border-bottom: 2px solid var(--blue);
      padding-bottom: 6px;
    }

    footer {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 15px;
    }

    footer::before {
      content: "";
      display: block;
      height: 1px;
      background: var(--line);
      margin: 0 0 42px;
    }

    @media (max-width: 700px) {
      .page {
        padding: 28px 24px 28px;
      }

      .brand {
        font-size: 22px;
      }

      .contact-top {
        font-size: 16px;
      }

      main {
        transform: none;
      }

      .divider {
        width: 160px;
        margin: 44px auto 36px;
      }

      .tagline {
        margin-bottom: 48px;
      }

      .email {
        gap: 14px;
      }

      .email svg {
        width: 28px;
        height: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a class="brand" href="/">Gibson Law<span class="dot">.</span></a>
      <a class="contact-top" href="mailto:info@gibsonlaw.ai">Contact us</a>
    </header>

    <main>
      <section class="hero">
        <h1>Gibson Law<span class="dot">.</span></h1>

        <div class="divider"></div>

        <p class="tagline">
          Elite law and commercial advisory.<br />
          Delivered differently.
        </p>

        <a class="email" href="mailto:shaun@gibsonlaw.ai">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
            <path d="M3 7l9 6 9-6"></path>
          </svg>
          <span>info@gibsonlaw.ai</span>
        </a>
      </section>
    </main>

    <footer>
      © 2025 Gibson Law. All rights reserved.
    </footer>
  </div>
</body>
</html>
